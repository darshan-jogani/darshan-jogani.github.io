<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Darshan Jogani</title>
    <script>
      // GitHub Pages SPA fallback — encodes the path as a query string so
      // index.html can reconstruct the correct URL client-side.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
